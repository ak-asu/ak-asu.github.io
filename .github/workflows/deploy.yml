# Simple workflow for deploying static content to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Define deployment environment variables
# env:
#   NODE_VERSION: 20
#   BUILD_DIR: ./dist/public # Adjusted to match your actual build output directory

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments for safety
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build and deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetch all history for accurate builds

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Build output directory 'dist' not found"
            exit 1
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "::error::index.html not found in build output"
            ls -la dist/
            exit 1
          fi

          echo "✓ Build verified successfully"
          du -sh dist/

      - name: Add .nojekyll file
        run: touch dist/.nojekyll

      - name: Create 404 page for SPA routing
        run: |
          # Copy index.html to 404.html for SPA support on GitHub Pages
          # This allows client-side routing to work properly
          cp dist/index.html dist/404.html
        continue-on-error: true

      - name: Optimize assets (images)
        run: |
          if [ -d "dist/assets" ]; then
            echo "Checking for image optimization opportunities..."
            # Uncomment below lines to enable image optimization
            # sudo apt-get update && sudo apt-get install -y jpegoptim optipng
            # find "dist" -type f -name "*.jpg" -exec jpegoptim --strip-all --max=85 {} \;
            # find "dist" -type f -name "*.png" -exec optipng -quiet -strip all {} \;
            echo "Image optimization skipped (enable by uncommenting commands above)"
          fi
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist"
          retention-days: 7

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

