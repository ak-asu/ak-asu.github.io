<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <!-- Replace with your own colors and designs -->
  <circle cx="50" cy="50" r="50" fill="#4F46E5"/>
  <g clip-path="url(#circleClip)">
    <!-- Replace this with your own content -->
    <!-- Example: Simple "P" for portfolio -->
    <text x="50" y="70" font-size="70" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold">A</text>
  </g>
</svg>
